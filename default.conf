server {
  listen 8081;
  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri /index.html;
  }
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }

  # allow long SSO cookies
  large_client_header_buffers 4 32k;
  client_header_buffer_size 32k;
}
